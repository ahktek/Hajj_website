version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: al-haramain-hajj-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/alharamain?schema=public
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: al-haramain-hajj-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=alharamain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
